/*Hover Effect CSS*/
/*********************** Demo - 8 *******************/
.box8 {
    overflow: hidden;
   
    margin-bottom: -25px;
}
.icon li{
    color: #fff;
    font-size: 25px;
}
.box8 .icon,.box8 .title{margin:0;position:absolute}
.box8{position:relative}
.box8 img{width:100%;height:auto;transition: transform 2s;}
.box8 img:hover{
transform: scale(1.1);
}

.box8 .box-content{width:100%;height:100%;background:rgba(0,0,0,.6);opacity:0;position:absolute;top:0;left:0;transform:perspective(400px) rotateX(-90deg);transform-origin:center top 0;transition:all .5s ease 0s}
.box8 .icon li a,.box8 .title{background:#ef4050;font-size:20px;color:#fff}
.box8:hover .box-content{opacity:1;transform:perspective(400px) rotateX(0)}
.box8 .title{padding:5px 7px;border-radius:5px;font-weight:600;bottom:20px;left:20px;transition:all .9s ease 0s}
.box8 .icon li a,.box9 .box-content,.box9 .icon li,.box9 img{transition:all .35s ease 0s}
.box8:hover .title{bottom:-40px}
.box8 .icon{list-style:none;padding:0;top:42%;left:0;right:0}
.box8 .icon li a{display:block;width:40px;height:40px;line-height:40px;border-radius:50%;margin-right:7px}
.box9 .icon,.box9 .title{width:100%;font-size:22px}
.box8 .icon li a:hover{background:#fff;color:#000}
@media only screen and (max-width:990px){.box8{margin-bottom:20px}
}

<script type="text/javascript">	
if (typeof window !== "undefined") {
      window.global = window;
    }
	var MOBILE_REDIRECT_URL_OLD = "";
	var MOBILE_REDIRECT_URL = window.location.origin + "/m/index.html";
	var is_tineyUrl = false;
	is_tineyUrl = getParameterByName('is_tiny_url_booking', window.location.href);
	if(is_tineyUrl == 'true'){
		MOBILE_REDIRECT_URL = window.location.origin + "/m/#/autofill-form" + window.location.search;
	}
	var TRAVEL_ID = 37134;
	var CURRENCY = "₹";
	var CMS_API_URL = "http://cms.ticketsimply.com";
  var SKIP_MOBILE_REDIRECT = false

	function isMobileDevice() {
	  return (typeof window.orientation !== "undefined") || (navigator.userAgent.indexOf('IEMobile') !== -1);
	};

	function getParameterByName(name, url) {
    if (!url) url = window.location.href;
    name = name.replace(/[\[\]]/g, '\\$&');
    var regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)'),
        results = regex.exec(url);
    if (!results) return null;
    if (!results[2]) return '';
    return decodeURIComponent(results[2].replace(/\+/g, ' '));
}

	function getCookie(cname) {
	  var name = cname + "=";
	  var ca = document.cookie.split(';');
	  for(var i = 0; i < ca.length; i++) {
	    var c = ca[i];
	    while (c.charAt(0) == ' ') {
	      c = c.substring(1);
	    }
	    if (c.indexOf(name) == 0) {
	      return c.substring(name.length, c.length);
	    }
	  }
	  return false;
	}

	function setMobileCookie(){
		if( !getCookie('is_mobile_app') ){
			var d = new Date();
			d.setTime(d.getTime() + (30 * 60 * 1000));
			document.cookie = "is_mobile_app=false; expires=" + d.toUTCString() + ";"
		}
	}

	function isFullVersion(){
		var isFullWeb = /mb=1/.test(window.location.search);

		if( isFullWeb && !getCookie('is_mobile_app') ){
			setMobileCookie()
		}

		if( location.pathname.includes("bangalore_tirupati_online_bus_booking_package_tour") || SKIP_MOBILE_REDIRECT ){
	    setMobileCookie()
	  }
	  if(TRAVEL_ID === 5103){
	  	setMobileCookie()
	  }
       
		return isFullWeb || getCookie('is_mobile_app') == "false"
	}
	if( isMobileDevice() && !isFullVersion() && (!location.pathname.includes("booking-confirm") && !location.pathname.includes("booking-cancel") && !location.pathname.includes("phone-blocking-to-ebooking"))){
		window.location = MOBILE_REDIRECT_URL;
	}

	function getConfig(cb){
		var userJson = localStorage.getItem('user');
  	user = userJson ? JSON.parse( userJson ).full : {};

		$.ajax({
	    url: API_URL + "api/cms_booking_engine.json",
	    method: 'post',
	    beforeSend: function(request) {
		    request.setRequestHeader("auth-token", user['authentication_token']);
		  },
	    data:{ 
	      query: 'q1'
	    },
	    success: function(response){
	    	cb(response)
	    }
	  })
	}

	$(document).ready(function(){
  $.ajax({
    url: API_URL + "/api/cms_banners.json",
    method: "get",
    dataType: 'json',
    data: {
      travel_id: TRAVEL_ID
    },
    success: function(res){
      constructBanner(res)
    }
  });

  $.ajax({
    url: API_URL + "api/sync_cms_contact_details.json",
    method: "get",
    dataType: "json",
    success: function(data) {
      let html = '<section id="terms_conditions"><div class="container">';
      html += '<h3>Cancellation Policy:</h3>';
      if (data.cancellation_policies && data.cancellation_policies.length > 0) {
        data.cancellation_policies.forEach(function(policy) {
          html += `<div>
            ${formatPolicyRange(
              policy.time_limit_from,
              policy.time_limit_to,
              policy.cancellation_type
            )}
            <b>${policy.percent}%</b> Cancellation Charges
          </div>`;
        });
      } else {
        html += `<div>No cancellation policies available.</div>`;
      }
      html += '</div></section>';
      $('#cancellation_policy_section').html(html);
    }
  });
});
function formatPolicyRange(from, to, cancellation_type) {
  from = parseFloat(from);
  to = parseFloat(to);
  if (cancellation_type == 2) {
    if (from === 0) {
      return `Less than ${to} Hrs from the main station departure time`;
    }
    return `Between ${from} Hrs to ${to} Hrs from the main station departure time`;
  }
  if (cancellation_type == 1) {
    if (from === 0) {
      return `Less than ${to} days before main station departure time`;
    }
    return `Between ${from} to ${to} days before main station departure time`;
  }
  return '';
}
</script>
